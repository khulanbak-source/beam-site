<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Beam Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── THEME VARIABLES ── */
:root {
  --transition: 0.2s ease;
}

[data-theme="dark"] {
  --bg:        #0d1117;
  --surface:   #161b24;
  --surface2:  #1e2535;
  --border:    #2a3147;
  --text:      #e2e8f0;
  --text-muted:#7a8499;
  --text-dim:  #4a5568;
  --accent:    #4ade80;
  --accent-bg: rgba(74,222,128,0.1);
  --accent-border: rgba(74,222,128,0.25);
  --green:     #4ade80;
  --yellow:    #fbbf24;
  --red:       #f87171;
  --orange:    #fb923c;
  --purple:    #a78bfa;
  --mono-bg:   #1e2535;
  --shadow:    0 4px 24px rgba(0,0,0,0.4);
}

[data-theme="light"] {
  --bg:        #f6f5f1;
  --surface:   #ffffff;
  --surface2:  #f0ede7;
  --border:    #dedad2;
  --text:      #2b2b2b;
  --text-muted:#7a7670;
  --text-dim:  #b8b4ac;
  --accent:    #1f3d2b;
  --accent-bg: rgba(31,61,43,0.07);
  --accent-border: rgba(31,61,43,0.2);
  --green:     #16a34a;
  --yellow:    #b45309;
  --red:       #dc2626;
  --orange:    #c2410c;
  --purple:    #6d28d9;
  --mono-bg:   #f0ede7;
  --shadow:    0 4px 24px rgba(0,0,0,0.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
}

/* ── HEADER ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(8px);
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-wordmark {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.01em;
}

.logo-wordmark .bar {
  color: var(--accent);
  font-weight: 300;
  margin: 0 5px;
  opacity: 0.7;
}

.logo-client {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-top: 1px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.week-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 5px 10px;
  letter-spacing: 0.04em;
}

.theme-toggle {
  width: 34px;
  height: 34px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--surface2);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  transition: all var(--transition);
}

.theme-toggle:hover { border-color: var(--accent); color: var(--text); }

.refresh-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 3px;
  padding: 7px 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity var(--transition);
}
[data-theme="light"] .refresh-btn { color: #fff; }
.refresh-btn:hover { opacity: 0.85; }
.refresh-btn.loading { opacity: 0.5; pointer-events: none; }

.logout-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 7px 12px;
  cursor: pointer;
  transition: all var(--transition);
  display: none;
}
.logout-btn:hover { border-color: var(--red); color: var(--red); }

/* ── MAIN ── */
main { padding: 24px; max-width: 1400px; margin: 0 auto; }

/* ── AUTH PANEL ── */
.auth-panel {
  max-width: 440px;
  margin: 80px auto 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.auth-header {
  padding: 28px 28px 20px;
  border-bottom: 1px solid var(--border);
}

.auth-logo {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 22px;
  font-weight: 500;
  margin-bottom: 6px;
}

.auth-logo .bar { color: var(--accent); font-weight: 300; margin: 0 5px; opacity: 0.7; }

.auth-tagline {
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 0.05em;
}

.auth-body { padding: 24px 28px; }

.auth-label {
  font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
  display: block;
}

.auth-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 3px;
  padding: 10px 13px;
  font-size: 13px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  margin-bottom: 14px;
  transition: border-color var(--transition);
}

.auth-input:focus { outline: none; border-color: var(--accent); }
.auth-input::placeholder { color: var(--text-dim); }

.auth-btn {
  width: 100%;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 3px;
  padding: 11px;
  font-size: 13px;
  font-weight: 600;
  font-family: 'Plus Jakarta Sans', sans-serif;
  cursor: pointer;
  transition: opacity var(--transition);
  letter-spacing: 0.02em;
}
[data-theme="light"] .auth-btn { color: #fff; }
.auth-btn:hover { opacity: 0.85; }
.auth-btn:disabled { opacity: 0.5; pointer-events: none; }

.auth-note {
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
  margin-top: 14px;
  line-height: 1.6;
}

.auth-error {
  font-size: 12px;
  color: var(--red);
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: 3px;
  padding: 9px 12px;
  margin-bottom: 12px;
  display: none;
}

/* ── FILTERS ── */
.filters {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-select {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 3px;
  padding: 7px 11px;
  font-size: 12px;
  font-family: 'IBM Plex Mono', monospace;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: border-color var(--transition);
}

.filter-select:focus { outline: none; border-color: var(--accent); }

/* ── STAT CARDS ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px 18px;
  transition: border-color var(--transition);
}

.stat-card.hi { border-left: 3px solid var(--accent); }
.stat-card.hi-g { border-left: 3px solid var(--green); }
.stat-card.hi-y { border-left: 3px solid var(--yellow); }
.stat-card.hi-o { border-left: 3px solid var(--orange); }

.stat-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 8px;
}

.stat-value {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 28px;
  font-weight: 600;
  line-height: 1;
  color: var(--text);
}

.stat-sub {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 5px;
}

/* ── SECTION TITLE ── */
.section-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 14px;
}

/* ── REP CARDS ── */
.rep-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.rep-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px;
}

.rep-name {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 9px;
}

.rep-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  flex-shrink: 0;
  color: white;
}

.rep-metrics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
  margin-bottom: 10px;
}

.rep-metric {
  background: var(--surface2);
  border-radius: 3px;
  padding: 8px 10px;
}

.rep-metric-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 3px;
}

.rep-metric-value {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 16px;
  font-weight: 600;
}

.bar-wrap { margin-top: 7px; }
.bar-label-row { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
.bar-track { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; }

/* ── PANELS ── */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 20px;
}

@media (max-width: 860px) { .two-col { grid-template-columns: 1fr; } }

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 20px;
}

/* ── FOLLOW-UP TABLE ── */
.fu-table { width: 100%; border-collapse: collapse; }
.fu-table th {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 0 8px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.fu-table td { padding: 9px 8px; border-bottom: 1px solid var(--border); font-size: 12px; vertical-align: middle; }
.fu-table tr:last-child td { border-bottom: none; }
.fu-table tbody tr:hover td { background: var(--surface2); }

.badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 2px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.b-hot      { background: rgba(248,113,113,.12); color: var(--red); }
.b-prospect { background: var(--accent-bg); color: var(--accent); }
.b-lead     { background: rgba(251,146,60,.12); color: var(--orange); }
.b-sold     { background: rgba(74,222,128,.12); color: var(--green); }
.b-testdrive{ background: rgba(167,139,250,.12); color: var(--purple); }
.b-visitor  { background: rgba(251,191,36,.12); color: var(--yellow); }
.b-other    { background: var(--surface2); color: var(--text-muted); }

.days-pill {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 2px;
}
.d-over { background: rgba(248,113,113,.12); color: var(--red); }
.d-soon { background: rgba(251,191,36,.12); color: var(--yellow); }
.d-ok   { background: rgba(74,222,128,.12); color: var(--green); }

/* ── SOURCE BARS ── */
.source-list { display: flex; flex-direction: column; gap: 10px; }
.source-row { display: flex; align-items: center; gap: 10px; }
.source-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.source-name { flex: 1; font-size: 12px; }
.source-bar { flex: 2; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.source-bar-fill { height: 100%; border-radius: 2px; }
.source-count { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; min-width: 20px; text-align: right; }

/* ── AI NEXT ACTIONS ── */
.ai-item {
  border-left: 2px solid var(--accent-border);
  padding: 10px 13px;
  margin-bottom: 9px;
  background: var(--surface2);
  border-radius: 0 3px 3px 0;
}
.ai-lead { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.ai-text { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
.ai-rep  { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--accent); margin-top: 4px; letter-spacing: 0.04em; }

/* ── CHART ── */
.chart-bars { display: flex; align-items: flex-end; gap: 8px; height: 100px; }
.chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.chart-bar { width: 100%; background: var(--accent-bg); border: 1px solid var(--accent-border); border-radius: 2px 2px 0 0; min-height: 4px; cursor: pointer; transition: background var(--transition); }
.chart-bar:hover { background: var(--accent); }
.chart-val { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; color: var(--text); }
.chart-label { font-size: 10px; color: var(--text-muted); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }

/* ── MISC ── */
.empty { color: var(--text-dim); font-size: 12px; font-style: italic; padding: 20px 0; text-align: center; }

.spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

.loading-state { text-align: center; padding: 48px 20px; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; }

@media (max-width: 600px) {
  header { padding: 12px 16px; }
  main { padding: 16px; }
  .week-badge { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div>
      <div class="logo-wordmark">beam</div>
      <div class="logo-client" id="clientLabel">Analytics</div>
    </div>
  </div>
  <div class="header-right">
    <span class="week-badge" id="weekLabel" style="display:none"></span>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="themeBtn">🌙</button>
    <button class="logout-btn" id="logoutBtn" onclick="logout()">sign out</button>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()" style="display:none">↻ Refresh</button>
  </div>
</header>

<main>

  <!-- AUTH PANEL -->
  <div id="authPanel">
    <div class="auth-panel">
      <div class="auth-header">
        <div class="auth-logo">beam</div>
        <div class="auth-tagline">Sales Analytics — Sign in</div>
      </div>
      <div class="auth-body">
        <div id="authError" class="auth-error"></div>
        <label class="auth-label">Your email</label>
        <input
          class="auth-input"
          id="authEmail"
          type="email"
          placeholder="you@company.com"
          onkeydown="if(event.key==='Enter') signIn()"
        />
        <button class="auth-btn" id="signInBtn" onclick="signIn()">Sign in</button>
        <div class="auth-note">Use the email you registered during onboarding.<br>Your data stays secure in n8n — never exposed here.</div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD (hidden until auth) -->
  <div id="dashboard" style="display:none">

    <div class="filters" id="filterBar">
      <select class="filter-select" id="filterRep" onchange="applyFilters()"><option value="">All Reps</option></select>
      <select class="filter-select" id="filterPeriod" onchange="applyFilters()">
        <option value="week">This Week</option>
        <option value="month">This Month</option>
        <option value="all">All Time</option>
      </select>
      <select class="filter-select" id="filterStatus" onchange="applyFilters()">
        <option value="">All Statuses</option>
        <option>Hot</option><option>Prospect</option><option>Lead</option>
        <option>Test Drive</option><option>Reserved</option><option>Sold</option><option>Lost</option>
      </select>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="loading-state" style="grid-column:1/-1">
        <div class="spinner"></div>Loading data…
      </div>
    </div>

    <div id="repSection" style="display:none">
      <div class="section-title">Performance by Rep</div>
      <div class="rep-grid" id="repGrid"></div>
    </div>

    <div class="two-col" id="twoCol1" style="display:none">
      <div class="panel">
        <div class="section-title">Follow-up Tracker</div>
        <div id="followupContent"></div>
      </div>
      <div class="panel">
        <div class="section-title">Source Channels</div>
        <div id="sourceContent"></div>
      </div>
    </div>

    <div class="two-col" id="twoCol2" style="display:none">
      <div class="panel">
        <div class="section-title">AI Next Actions</div>
        <div id="aiContent"></div>
      </div>
      <div class="panel">
        <div class="section-title">Logs per Rep</div>
        <div id="chartContent"></div>
      </div>
    </div>

  </div>
</main>

<script>
// ── AUTH ENDPOINT ──
// POST { email } → returns { success, webhook_url, client_name, user_name }
const AUTH_ENDPOINT = 'https://n8n.urstory.studio/webhook/beam-analytics';

let WEBHOOK_URL = '';
let allLogs = [], filteredLogs = [];

// ── THEME ──
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('beam_theme', isDark ? 'light' : 'dark');
}

// Restore theme
const savedTheme = localStorage.getItem('beam_theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '☀️' : '🌙';

// ── AUTH ──
async function signIn() {
  const email = document.getElementById('authEmail').value.trim();
  const errEl = document.getElementById('authError');
  errEl.style.display = 'none';

  if (!email || !email.includes('@')) {
    errEl.textContent = 'Please enter a valid email address.';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('signInBtn');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const res = await fetch(AUTH_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    const data = await res.json();

    if (!data.success || !data.webhook_url) {
      throw new Error(data.error || 'Email not found. Contact your Beam admin.');
    }

    // Store session
    WEBHOOK_URL = data.webhook_url;
    localStorage.setItem('beam_session', JSON.stringify({
      email,
      webhook_url: data.webhook_url,
      client_name: data.client_name || '',
      user_name:   data.user_name   || ''
    }));

    onAuthSuccess(data);

  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = 'Sign in';
}

function onAuthSuccess(data) {
  document.getElementById('authPanel').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('refreshBtn').style.display = '';
  document.getElementById('logoutBtn').style.display = '';

  if (data.client_name) {
    document.getElementById('clientLabel').textContent = data.client_name + ' · Analytics';
    document.title = `Beam Analytics — ${data.client_name}`;
  }

  loadData();
}

function logout() {
  localStorage.removeItem('beam_session');
  WEBHOOK_URL = '';
  allLogs = [];
  document.getElementById('authPanel').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('refreshBtn').style.display = 'none';
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('weekLabel').style.display = 'none';
  document.getElementById('authEmail').value = '';
  document.getElementById('authError').style.display = 'none';
  document.getElementById('clientLabel').textContent = 'Analytics';
}

// Restore session
const saved = localStorage.getItem('beam_session');
if (saved) {
  try {
    const s = JSON.parse(saved);
    WEBHOOK_URL = s.webhook_url;
    onAuthSuccess(s);
  } catch(e) { localStorage.removeItem('beam_session'); }
}

// ── DATA LOADING ──
async function loadData() {
  if (!WEBHOOK_URL) return;
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading'); btn.textContent = '↻ Loading…';
  document.getElementById('statsGrid').innerHTML = '<div class="loading-state" style="grid-column:1/-1"><div class="spinner"></div>Fetching from n8n…</div>';

  try {
    const session = JSON.parse(localStorage.getItem('beam_session') || '{}');
    const company = session.client_name || '';
    const url = company ? `${WEBHOOK_URL}?company=${encodeURIComponent(company)}` : WEBHOOK_URL;
    const r = await fetch(url, { method: 'GET', headers: { 'Content-Type': 'application/json' } });
    if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
    const data = await r.json();
    if (!Array.isArray(data)) throw new Error('Unexpected response format from webhook.');
    allLogs = data;
    populateRepFilter();
    applyFilters();
    document.getElementById('weekLabel').style.display = '';
  } catch(e) {
    document.getElementById('statsGrid').innerHTML = `<div class="loading-state" style="grid-column:1/-1;color:var(--red)">
      Error: ${e.message}<br><small style="color:var(--text-muted);margin-top:6px;display:block">Check that the n8n workflow is active</small>
    </div>`;
  }

  btn.classList.remove('loading'); btn.textContent = '↻ Refresh';
}

// ── FILTERS & RENDER ──
function populateRepFilter() {
  const reps = [...new Set(allLogs.map(l=>l.salesperson).filter(Boolean))].sort();
  const sel = document.getElementById('filterRep');
  sel.innerHTML = '<option value="">All Reps</option>' + reps.map(r=>`<option>${r}</option>`).join('');
}

function getWeekNum(d) {
  const s = new Date(d.getFullYear(),0,1);
  return Math.ceil(((d-s)/86400000+s.getDay()+1)/7);
}

function applyFilters() {
  const rep    = document.getElementById('filterRep').value;
  const period = document.getElementById('filterPeriod').value;
  const status = document.getElementById('filterStatus').value;
  const now    = new Date();

  filteredLogs = allLogs.filter(l => {
    if (rep    && l.salesperson !== rep)    return false;
    if (status && l.leadStatus  !== status) return false;
    if (period !== 'all' && l.logDate) {
      const d = new Date(l.logDate);
      if (period === 'week') {
        const wkStart = new Date(now); wkStart.setDate(now.getDate()-now.getDay()); wkStart.setHours(0,0,0,0);
        if (d < wkStart) return false;
      } else if (period === 'month') {
        if (d.getMonth()!==now.getMonth()||d.getFullYear()!==now.getFullYear()) return false;
      }
    }
    return true;
  });
  renderAll();
}

function renderAll() {
  const now = new Date();
  document.getElementById('weekLabel').textContent = `W${getWeekNum(now)} · ${now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
  renderStats();
  renderReps();
  renderFollowups();
  renderSources();
  renderAI();
  renderChart();
  document.getElementById('repSection').style.display = '';
  document.getElementById('twoCol1').style.display = 'grid';
  document.getElementById('twoCol2').style.display = 'grid';
}

function renderStats() {
  const L = filteredLogs, n = L.length;
  const voice     = L.filter(l=>l.inputType==='Voice').length;
  const withAction= L.filter(l=>l.hasNextAction==='Yes').length;
  const newLeads  = L.filter(l=>l.actionType==='New Lead').length;
  const updates   = L.filter(l=>l.actionType==='Update').length;
  const reps      = new Set(L.map(l=>l.salesperson).filter(Boolean)).size;
  const totAuto   = L.reduce((s,l)=>s+l.autoExtracted,0);
  const totManual = L.reduce((s,l)=>s+l.manuallyAsked,0);
  const aiScore   = n ? Math.round(totAuto/(totAuto+totManual+.001)*100) : 0;
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card hi">
      <div class="stat-label">Total Logs</div>
      <div class="stat-value">${n}</div>
      <div class="stat-sub">${newLeads} new · ${updates} updates</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Active Reps</div>
      <div class="stat-value">${reps}</div>
      <div class="stat-sub">in selected period</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Voice Usage</div>
      <div class="stat-value">${n?Math.round(voice/n*100):0}%</div>
      <div class="stat-sub">${voice} voice · ${n-voice} text</div>
    </div>
    <div class="stat-card hi-g">
      <div class="stat-label">AI Extraction</div>
      <div class="stat-value" style="color:var(--green)">${aiScore}%</div>
      <div class="stat-sub">auto vs manually asked</div>
    </div>
    <div class="stat-card hi-y">
      <div class="stat-label">Next Actions</div>
      <div class="stat-value">${withAction}</div>
      <div class="stat-sub">${n?Math.round(withAction/n*100):0}% of logs</div>
    </div>
    <div class="stat-card hi-o">
      <div class="stat-label">Reminders Set</div>
      <div class="stat-value">${L.filter(l=>l.calendarSet==='Yes').length}</div>
      <div class="stat-sub">calendar events</div>
    </div>
  `;
}

function renderReps() {
  const map = {};
  for (const l of filteredLogs) {
    if (!l.salesperson) continue;
    if (!map[l.salesperson]) map[l.salesperson]={logs:0,voice:0,auto:0,manual:0,actions:0};
    const r = map[l.salesperson];
    r.logs++; if(l.inputType==='Voice') r.voice++;
    r.auto+=l.autoExtracted; r.manual+=l.manuallyAsked;
    if(l.hasNextAction==='Yes') r.actions++;
  }
  const entries = Object.entries(map).sort((a,b)=>b[1].logs-a[1].logs);
  const avatarColors = ['#2d5a3d','#1e3a5f','#5a2d2d','#2d4a5a','#4a3d2d','#3d2d5a'];
  document.getElementById('repGrid').innerHTML = entries.length ? entries.map(([name,r],i)=>{
    const ini = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const vPct = r.logs?Math.round(r.voice/r.logs*100):0;
    const tot  = r.auto+r.manual;
    const aPct = tot?Math.round(r.auto/tot*100):0;
    return `<div class="rep-card">
      <div class="rep-name">
        <div class="rep-avatar" style="background:${avatarColors[i%avatarColors.length]}">${ini}</div>
        ${name}
      </div>
      <div class="rep-metrics">
        <div class="rep-metric"><div class="rep-metric-label">Logs</div><div class="rep-metric-value">${r.logs}</div></div>
        <div class="rep-metric"><div class="rep-metric-label">Next Actions</div><div class="rep-metric-value">${r.actions}</div></div>
        <div class="rep-metric"><div class="rep-metric-label">AI Extract</div><div class="rep-metric-value" style="color:var(--green)">${aPct}%</div></div>
        <div class="rep-metric"><div class="rep-metric-label">Voice</div><div class="rep-metric-value" style="color:var(--accent)">${vPct}%</div></div>
      </div>
      <div class="bar-wrap"><div class="bar-label-row"><span>Voice</span><span>${vPct}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${vPct}%;background:var(--accent)"></div></div></div>
      <div class="bar-wrap"><div class="bar-label-row"><span>AI auto-extraction</span><span>${aPct}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${aPct}%;background:var(--green)"></div></div></div>
    </div>`;
  }).join('') : '<div class="empty">No rep data for this period</div>';
}

function renderFollowups() {
  const now   = new Date();
  const items = filteredLogs.filter(l=>l.nextActionDate).sort((a,b)=>new Date(a.nextActionDate)-new Date(b.nextActionDate)).slice(0,10);
  if (!items.length) { document.getElementById('followupContent').innerHTML='<div class="empty">No upcoming actions</div>'; return; }
  const bmap = {Hot:'b-hot',Prospect:'b-prospect',Lead:'b-lead',Sold:'b-sold','Test Drive':'b-testdrive',Visitor:'b-visitor'};
  const dayTag = ds => {
    const diff = Math.ceil((new Date(ds)-now)/86400000);
    const cls  = diff<0?'d-over':diff<=2?'d-soon':'d-ok';
    const lbl  = diff<0?`${Math.abs(diff)}d overdue`:diff===0?'Today':`${diff}d`;
    return `<span class="days-pill ${cls}">${lbl}</span>`;
  };
  document.getElementById('followupContent').innerHTML = `<table class="fu-table">
    <thead><tr><th>Lead</th><th>Status</th><th>Rep</th><th>Due</th></tr></thead>
    <tbody>${items.map(l=>`<tr>
      <td><div style="font-weight:600">${l.leadName||'—'}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">${(l.nextActionLabel||'').slice(0,42)}</div></td>
      <td><span class="badge ${bmap[l.leadStatus]||'b-other'}">${l.leadStatus||'—'}</span></td>
      <td style="color:var(--text-muted);font-size:11px">${l.salesperson||'—'}</td>
      <td>${dayTag(l.nextActionDate)}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function renderSources() {
  const map = {};
  for (const l of filteredLogs) { const s=l.sourceChannel||'Other'; map[s]=(map[s]||0)+1; }
  const sorted = Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const max    = sorted[0]?.[1]||1;
  const cols   = ['#4ade80','#60a5fa','#f59e0b','#f87171','#a78bfa','#34d399','#fb923c','#e879f9'];
  document.getElementById('sourceContent').innerHTML = sorted.length ? `<div class="source-list">${
    sorted.map(([name,count],i)=>`<div class="source-row">
      <div class="source-dot" style="background:${cols[i%cols.length]}"></div>
      <div class="source-name">${name}</div>
      <div class="source-bar"><div class="source-bar-fill" style="width:${Math.round(count/max*100)}%;background:${cols[i%cols.length]}"></div></div>
      <div class="source-count">${count}</div>
    </div>`).join('')
  }</div>` : '<div class="empty">No source data</div>';
}

function renderAI() {
  const leadMap = {};
  for (const l of filteredLogs) {
    if (l.hasNextAction!=='Yes'||!l.leadName) continue;
    if (!leadMap[l.leadName]||new Date(l.logDate)>new Date(leadMap[l.leadName].logDate)) leadMap[l.leadName]=l;
  }
  const leads = Object.values(leadMap).sort((a,b)=>new Date(a.nextActionDate||0)-new Date(b.nextActionDate||0)).slice(0,6);
  const sc = {Hot:'var(--red)',Prospect:'var(--accent)',Lead:'var(--orange)','Test Drive':'var(--purple)'};
  document.getElementById('aiContent').innerHTML = leads.length ? leads.map(l=>`
    <div class="ai-item">
      <div class="ai-lead" style="color:${sc[l.leadStatus]||'var(--text)'}">${l.leadName} <span style="font-weight:400;font-size:11px;color:var(--text-muted)">${l.leadStatus}</span></div>
      <div class="ai-text">↳ ${l.nextActionLabel||'Follow up'}</div>
      ${l.nextActionDate?`<div class="ai-text">⏰ ${new Date(l.nextActionDate).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>`:''}
      <div class="ai-rep">→ ${l.salesperson}</div>
    </div>`).join('') : '<div class="empty">No pending next actions</div>';
}

function renderChart() {
  const map = {};
  for (const l of filteredLogs) { if(!l.salesperson) continue; map[l.salesperson]=(map[l.salesperson]||0)+1; }
  const sorted = Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const max    = sorted[0]?.[1]||1;
  document.getElementById('chartContent').innerHTML = sorted.length ? `<div class="chart-bars">${
    sorted.map(([name,count])=>`<div class="chart-bar-wrap">
      <div class="chart-val">${count}</div>
      <div class="chart-bar" style="height:${Math.round(count/max*85)}px" title="${name}: ${count}"></div>
      <div class="chart-label">${name.split(' ')[0]}</div>
    </div>`).join('')
  }</div>` : '<div class="empty">No data</div>';
}
</script>
</body>
</html>
